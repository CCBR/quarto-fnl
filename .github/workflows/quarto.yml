name: quarto-publish

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write
  pages: write

jobs:

  quarto-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: r-lib/setup-r@v2
      - uses: r-lib/setup-r-dependencies@v2
      - name: Render
        run: quarto render
      - name: Render & Publish to GitHub Pages
        uses: quarto-dev/quarto-actions/publish@v2
        if: github.event_name == "push" && github.ref == "refs/heads/main"
        with:
          target: gh-pages
          render: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
